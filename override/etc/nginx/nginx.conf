daemon off;
error_log /mnt/config/log/nginx-error.log warn;
worker_processes 4;
worker_rlimit_nofile 65535;

events {
    multi_accept on;
    use epoll;
    worker_connections 4096;
}

http {
    # MIME Types
    include /mnt/config/etc/mime.types;
    default_type application/octet-stream;
    types_hash_max_size 2048;

    # Basic Necessities
    charset utf-8;
    index index.html;
    sendfile on;
    server_tokens off;
    ssi off;
    tcp_nodelay on;
    tcp_nopush on;

    # Access Log
    map $upstream_cache_status $log_cache_status {
        default $upstream_cache_status;
        "" "-";
    }
    log_format combolog '$remote_addr $log_cache_status $remote_user [$time_local] ' '"$request" $status $body_bytes_sent ' '"$http_referer" "$http_user_agent" ' '$request_time $upstream_response_time ' '$ssl_protocol $ssl_cipher';
    access_log /mnt/config/log/nginx-access.log combolog;
    #access_log /mnt/config/log/nginx-access.log combined;

    # May need to override for specific applications.
    client_body_buffer_size 128k;
    client_body_timeout 12s;
    client_header_timeout 12s;
    client_max_body_size 10m;
    large_client_header_buffers 4 16k;

    # Enable Compression
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied no-cache no-store private expired auth;
    gzip_types application/atom+xml application/javascript application/json application/manifest+json application/rss+xml application/wasm application/x-javascript application/xhtml+xml application/xspf+xml image/bmp image/svg+xml image/tiff image/vnd.microsoft.icon image/x-icon text/css text/mathml text/plain text/xml;
    gzip_vary on;

    # Probably not needed...
    keepalive_requests 9001;
    keepalive_timeout 65s;

    # Performance Tweaks
    open_file_cache max=1000 inactive=20s;
    open_file_cache_errors on;
    open_file_cache_min_uses 2;
    open_file_cache_valid 30s;

    # Proxy Caching
    proxy_cache www_cache;
    proxy_cache_background_update on;
    proxy_cache_key $scheme$request_method$host$request_uri;
    proxy_cache_lock on;
    proxy_cache_path /mnt/config/cache levels=1:2 keys_zone=www_cache:10m max_size=10g inactive=1d use_temp_path=off;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    proxy_cache_valid 30m;

    # For Application Cache Bypass
    # Add specific paths like this:
    #
    #   ~*/(assets|static)/ "" ;
    #
    map $request_uri $no_cache {
        default 1;
        ~*\.(?:css|eot|gif|ico|jpeg|jpg|js|json|mjs|mp3|mp4|ogg|png|svg|ttf|webp|woff|woff2|xml)$ "" ;
    }

    # For X-Cache-Status Header
    map $remote_addr $cache_status {
        127.0.0.1 $upstream_cache_status;
        default "";
    }

    # DNS
    resolver 8.8.8.8 8.8.4.4 valid=3600s;
    resolver_timeout 5s;

    # TLSRef Intermediate
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /mnt/config/ssl/dhparam.pem;

    # SSL Session Management
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_session_timeout 4h;

    # LetsEncrypt no longer provides OCSP.
    #ssl_stapling on;
    #ssl_stapling_verify on;

    # Cache Control
    map $sent_http_content_type $expires {
        default off;

        application/json epoch;
        application/xhtml+xml epoch;
        application/xspf+xml epoch;
        text/html epoch;
        text/xml epoch;

        application/atom+xml 7d;
        application/javascript 7d;
        application/manifest+json 7d;
        application/rss+xml 7d;
        application/wasm 7d;
        application/x-javascript 7d;
        text/css 7d;
        text/mathml 7d;
        text/plain 7d;

        ~audio/ 42d;
        ~font/ 42d;
        ~image/ 42d;
        ~video/ 42d;
    }
    expires $expires;

    # Websockets Support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Rate Limiting
    # Disable if behind CloudFlare.

    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    limit_req_status 429;

    include /mnt/config/etc/nginx.d/*.conf;
}
